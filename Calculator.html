<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console based Calculator</title>
</head>
<body>
    <script>
 
    let choice = prompt(
        "Console Calculator\n" +
        "1. Addition\n" +
        "2. Subtraction\n" +
        "3. Multiplication\n" +
        "4. Division\n" +
        "5. Square of a number\n" +
        "6. Modulus\n"+
        "7. Exit\n" +
        "Enter your choice:"
    );

    if (choice == 7) {
        alert("Calculator Closed");
    }

    let num1 = Number(prompt("Enter first number:"));
    let num2;
    let result;

    switch (choice) {

        case "1":
            num2 = Number(prompt("Enter second number:"));
            result = num1 + num2;
            alert("Result: " + result);
            break;

        case "2":
            num2 = Number(prompt("Enter second number:"));
            result = num1 - num2;
            alert("Result: " + result);
            break;

        case "3":
            num2 = Number(prompt("Enter second number:"));
            result = num1 * num2;
            alert("Result: " + result);
            break;

        case "4":
            num2 = Number(prompt("Enter second number:"));
            result = num1 / num2;
            alert("Result: " + result);
            break;

        case "5":
            result = num1 * num1;
            alert("Square: " + result);
            break;

        case"6":
            num2 = Number(prompt("Enter second number:"));
            result = num1 % num2;
            alert("Remainder:"+ result);
            break;
           
        default:
            alert("Invalid Choice");
    }
    
    </script>
</body>
</html>:
